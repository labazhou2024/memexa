# memexa backend stack — minimal pg + Hindsight only.
#
# Started/managed by `memexa backend up/down/status`. Seeded into
# `~/.memexa/docker-compose.yml` on first run from the packaged
# template (this file).
#
# To customize (e.g. expose different host ports, swap in an existing
# PostgreSQL instance), copy this file or edit the seeded copy at
# ~/.memexa/docker-compose.yml.
#
# Manual control:
#   docker compose -f ~/.memexa/docker-compose.yml up -d
#   docker compose -f ~/.memexa/docker-compose.yml down
#   docker compose -f ~/.memexa/docker-compose.yml down -v   # also wipes pg-data
#
# Note: this file does NOT include the optional `dashboard` UI service,
# because that one requires a build context (docker/dashboard.Dockerfile)
# that is not packaged inside the wheel. Run the dashboard manually
# (`python -m memexa.dashboard.sys_monitor.server`) if you want it; it
# only needs the same backend that's started here.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memexa-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: memexa
      POSTGRES_PASSWORD: memexa_dev
      POSTGRES_DB: memexa
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memexa -d memexa"]
      interval: 10s
      timeout: 5s
      retries: 5

  hindsight:
    image: ghcr.io/vectorize-io/hindsight-api:latest
    container_name: memexa-hindsight
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HINDSIGHT_DATABASE_URL: postgresql://memexa:memexa_dev@postgres:5432/memexa
      HINDSIGHT_HOST: 0.0.0.0
      HINDSIGHT_PORT: 8888
      HINDSIGHT_LOG_LEVEL: info
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8888/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  pg-data:
