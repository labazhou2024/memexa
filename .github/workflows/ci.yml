name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check memexa tests examples
      - name: Black (check only)
        run: black --check memexa tests examples
        continue-on-error: true

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Import smoke
        run: python -c "import memexa, memexa.cli.main; print('import smoke OK')"
      - name: Pytest
        run: pytest -q

  package:
    name: Package build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: pip install --upgrade pip build twine
      - name: Build
        run: python -m build --sdist --wheel
      - name: Check
        run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: memexa-${{ github.sha }}-dist
          path: dist/

  demo-smoke:
    name: Demo (end-to-end, no backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Stub ingest (no backend required)
        run: python -m examples.demo_dataset.ingest --dry-run
      - name: CLI smoke
        run: |
          memexa --version
          memexa version
          memexa demo

  pii-scan:
    name: PII residual scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Structural-fingerprint + token PII sweep
        run: bash scripts/full_pii_scan.sh
