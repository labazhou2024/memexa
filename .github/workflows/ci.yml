name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff (correctness rules only — style queued for v0.2)
        run: ruff check memexa tests
      - name: Black (check only, warn-only for v0.1.0-rc1)
        run: black --check memexa tests
        continue-on-error: true

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
        exclude:
          # macos py3.10 wheel availability is patchy for one transitive dep;
          # safe to drop until we either pin or relax requires-python.
          - os: macos-latest
            python: "3.10"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Import smoke
        run: |
          python -c "import pkgutil, importlib; \
            [importlib.import_module(name) for _, name, _ in pkgutil.iter_modules(['memexa/core'], 'memexa.core.')]; \
            print('import smoke OK')"
      - name: Pytest (unit + integration)
        run: pytest -m "not e2e" --cov=memexa --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  package:
    name: Package build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: pip install --upgrade pip build twine
      - name: Build
        run: python -m build --sdist --wheel
      - name: Check
        run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: memexa-${{ github.sha }}-dist
          path: dist/

  demo-smoke:
    name: Demo dataset (offline ingest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Stub ingest (no backend required)
        run: python -m examples.demo_dataset.ingest --dry-run
      - name: CLI smoke
        run: |
          python -m memexa.cli.main --version
          python -m memexa.cli.main version
          python -m memexa.cli.main config

  pii-scan:
    name: PII residual scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Scan for known PII tokens
        run: |
          set -e
          # Patterns come from scripts/pii_patterns.txt (single source of truth).
          # Note that `labazhou2024` is the maintainer's GitHub handle and is
          # allowed (it appears in the canonical repo URL and CITATION.cff).
          bash scripts/full_pii_scan.sh

# sanitize-audit job removed: it depended on .audit/ scripts that are
# intentionally git-ignored (maintainer-only research artifacts). The
# pii-scan job above covers the public-facing residual check.
