name: Publish to PyPI

on:
  # release.types=[published] removed 2026-05-14 — PyPI Trusted Publisher
  # not yet configured on the PyPI side; auto-triggering on every release
  # was causing red CI runs. Re-enable once `pip install memexa` is wired
  # via PyPI trusted publishing (see ROADMAP v0.1.0 stable / v0.2 PyPI
  # release). Until then, publish manually via workflow_dispatch.
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build deps
        run: |
          python -m pip install -U pip
          pip install build twine
      - name: Build
        run: python -m build --sdist --wheel
      - name: Twine check
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
    environment:
      name: testpypi
      url: https://test.pypi.org/p/memexa
    permissions:
      id-token: write   # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
    environment:
      name: pypi
      url: https://pypi.org/p/memexa
    permissions:
      id-token: write   # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
