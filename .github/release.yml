changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
  categories:
    - title: ⚠ Breaking changes
      labels:
        - breaking
        - "breaking-change"
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug fixes
      labels:
        - bug
        - fix
    - title: 📝 Documentation
      labels:
        - docs
        - documentation
    - title: 🔬 Tests
      labels:
        - tests
        - test
    - title: 🛠 Internal
      labels:
        - refactor
        - chore
        - ci
    - title: Other changes
      labels:
        - "*"
