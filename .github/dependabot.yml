version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - ci
    commit-message:
      prefix: "ci"

  # docker package-ecosystem removed: this repo does not ship a Dockerfile.
  # The `docker-compose.example.yml` references the upstream pgvector + hindsight
  # images directly; their versions are pinned in that file and updated manually.
